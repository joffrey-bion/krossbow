name: dependabot-pr-post-processing

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  internal-label:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Add the 'internal' label for non user-visible dependencies
        if: steps.metadata.outputs.dependency-group == 'infra-gradle-plugins' || steps.metadata.outputs.dependency-group == 'test-dependencies'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{github.event.pull_request.html_url}}
        run: gh pr edit "$PR_URL" --add-label "internal"

  update-locks:
    if: >
      github.actor == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.title, 'Bump kotlin ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          # Important: checkout the PR head, not merge commit
          ref: ${{ github.event.pull_request.head.ref }}
          # Needed so we can push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Update Kotlin JS/Wasm lock files
        run: |
          ./gradlew kotlinUpgradeYarnLock kotlinWasmUpgradeYarnLock

      - name: Commit changes (if any)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add kotlin-js-store
            git commit -m "Update yarn lock files after Kotlin bump"
            git push
          else
            echo "No changes to commit"
          fi
