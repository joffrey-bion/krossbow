site_name: Krossbow
site_url: https://joffrey-bion.github.io/krossbow
repo_name: krossbow
repo_url: https://github.com/joffrey-bion/krossbow
site_description: "A coroutine-based Kotlin multi-platform STOMP 1.2 client over web sockets."
site_author: Joffrey Bion
copyright: Copyright &copy; 2019 - 2026 Joffrey Bion

theme:
  name: material
  icon:
    annotation: material/information-slab-circle
    repo: fontawesome/brands/github
  font:
    code: JetBrains Mono
  features:
    - content.action.edit # adds an "Edit this page" button to each page
    - content.code.annotate # allows annotations (tooltips) inside code blocks
    - content.code.copy # adds a copy button to code blocks
    - content.footnote.tooltips # adds a tooltip to footnotes references on hover
    - content.tooltips # replaces the default browser title tooltips with nicer tooltips
    - navigation.expand # makes the navigation sections collapsible
    - navigation.footer # for next/prev links at the bottom of each page
    - navigation.indexes # to be able to associate a Markdown file with the "root" of a section without a nested page
    - navigation.instant # to use XHR instead of reloading the page when following links
    - navigation.instant.preview # to show a preview tooltip when hovering links to other pages
    - navigation.top # adds a back-to-top button when scrolling up after scrolling down on a page
    - navigation.tracking # updates the URL bar with anchors as the user scrolls
    - search.highlight # highlights the search term in the target page when clicking a search result
    - search.share # allows deep linking to search results
    - search.suggest # enables completion in the search bar
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - macros # for variable substitution in Markdown files
  - git-revision-date-localized: # to have the "last update" date in the footer of each page
      enabled: !ENV [CI, false] # we don't put the whole repo in the docker container locally, so there is no git repo
  - search
  - social # for proper previews in social media links

markdown_extensions:
  - abbr # for abbreviation tooltips
  - admonition # for info/warn/tip/... sections
  - attr_list # required for attribute-based features (grid, alignment, buttons, tooltips, etc.)
  - def_list # for definition lists (stomp config)
  - footnotes
  - md_in_html # to process Markdown inside HTML (useful for grids)
  - pymdownx.details # for collapsible admonitions
  - pymdownx.emoji: # for emoji shortcuts with :name: syntax
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - .icons
  - pymdownx.highlight # for syntax highlighting in code blocks
  - pymdownx.inlinehilite # for inline code highlighting
  - pymdownx.snippets
  - pymdownx.superfences: # required for code highlighting, tabs, and nested content in general
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed: # for tabs support
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify # use the tab name in URL anchor instead of '__tabbed_1_1'
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - 'Overview': index.md
  - 'STOMP':
    - 'Getting started': stomp/getting-started.md
    - 'Configuration': stomp/config.md
    - 'Body conversions':
      - 'Kotlinx Serialization': stomp/conversions/kx-serialization.md
      - 'Jackson': stomp/conversions/jackson.md
      - 'Moshi': stomp/conversions/moshi.md
      - 'Custom conversions': stomp/conversions/custom.md
    - 'Advanced features': stomp/advanced-features.md
  - 'Web socket clients':
    - 'Built-in': websocket/builtin.md
    - 'Ktor': websocket/ktor.md
    - 'OkHttp': websocket/okhttp.md
    - 'Spring': websocket/spring.md
    - 'SockJS': websocket/sockjs.md
    - 'Implement your own': websocket/custom.md
  - 'Artifacts summary': artifacts.md
  - 'Migration guides': migration-guides.md
  - 'API Docs ↗': kdoc/index.html
  - 'Change Log ↗': https://github.com/joffrey-bion/krossbow/blob/main/CHANGELOG.md
  - 'License': license.md

extra:
  analytics:
    provider: google
    property: G-ZMF5BS7V5E
  social:
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/joffreybion
      name: "Joffrey on Twitter"
  versions:
    jackson: 2.18.3
    ktor: 3.1.1
    ktorLegacy: 2.3.12
    kotlinxSerialization: 1.8.0
    moshi: 1.15.2
    tyrus: 2.2.0


# Fails the docs build if there are any warnings (this avoids publishing a site with broken links)
strict: true

validation:
  absolute_links: relative_to_docs
  anchors: warn
  omitted_files: warn
  unrecognized_links: warn
